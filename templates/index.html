<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gugolf AI Preview Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0a84ff;
            --primary-dark: #0040dd;
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f5f5f7;
            --text-dim: #a1a1a6;
            --accent-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(to bottom, #161c24, var(--bg));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            margin: 0;
            background: linear-gradient(45deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            padding-bottom: 100px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 16px 32px;
            border-radius: 16px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #btn-preview {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3);
        }

        #btn-image {
            background-color: #2c2c2e;
            color: white;
            border: 1px solid var(--glass-border);
        }

        button:hover {
            transform: translateY(-4px);
            filter: brightness(1.2);
        }

        button:active {
            transform: scale(0.98);
        }

        .output-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 40px;
        }

        .panel {
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: var(--accent-gold);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
        }

        textarea {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 16px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.02);
        }

        th,
        td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(0, 255, 127, 0.1);
            color: #00ff7f;
            margin-left: 10px;
        }

        /* Responsive */
        /* 커뮤니티 반응 입력 카드 */
        .reaction-card {
            background: rgba(255, 204, 0, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
        }
        .reaction-tour-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .reaction-tour-item label {
            font-size: 0.8rem;
            color: var(--accent-gold);
            font-weight: 600;
        }
        .reaction-tour-item textarea {
            min-height: 70px;
            font-size: 0.85rem;
            resize: vertical;
        }
        /* 썸네일 후보 카드 */
        .thumbnail-section {
            margin-top: 32px;
            display: none;
        }
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 12px;
        }
        .thumbnail-card {
            background: rgba(10, 132, 255, 0.1);
            border: 1px solid rgba(10, 132, 255, 0.3);
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .thumbnail-card:hover {
            background: rgba(10, 132, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(10, 132, 255, 0.2);
        }
        .thumbnail-card .num {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .thumbnail-card .text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.4;
        }
        .thumbnail-card .copy-hint {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .thumbnail-card:hover .copy-hint { opacity: 1; }
        @media (max-width: 900px) {
            .output-section { grid-template-columns: 1fr; }
            .thumbnail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <header>
        <h1>Gugolf Preview Hub</h1>
        <p style="color: var(--text-dim); margin-top: 10px;">스마트한 골프 뉴스 제작을 위한 AI 파트너</p>
    </header>

    <div class="container">
        <div class="card actions">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-size: 0.8rem; color: var(--text-dim);">검색 기준 날짜</label>
                <input type="date" id="ref-date" value="2026-03-03"
                    style="padding: 12px; border-radius: 8px; background: #1c1c1e; border: 1px solid var(--glass-border); color: white;">
            </div>
            <button id="btn-preview">
                <span>오늘의 프리뷰 생성</span>
                <div class="loader" id="loader-preview"></div>
            </button>
            <button id="btn-report" style="background-color: #4a90e2; color: #fff; border: none;">
                <span>지난주 결과 리포트 생성</span>
                <div class="loader" id="loader-report"></div>
            </button>

            <button id="btn-notion" style="background-color: #ffffff; color: #000; border: none; font-weight: 700;">
                <span>📓 노션으로 내보내기</span>
                <div class="loader" id="loader-notion" style="border-top-color: #000;"></div>
            </button>
        </div>

        <div class="output-section">
            <div class="panel">
                <div class="panel-header" id="label-script">📝 TTS 스크립트 <span id="script-count" class="status-badge"
                        style="display:none;">0자</span></div>
                <textarea id="output-script" placeholder="프리뷰 혹은 리포트 생성 버튼을 누르면 대본이 여기에 출력됩니다."></textarea>
            </div>
            <div class="panel">
                <div class="panel-header" id="label-points">⛳ 관전 포인트</div>
                <textarea id="output-points" placeholder="핵심 내용이 여기에 출력됩니다." style="min-height: 150px;"></textarea>

                <div class="panel-header" style="margin-top: 24px;">📊 수집된 대회</div>
                <div id="tournaments-list"
                    style="background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; font-size: 0.9rem; color: var(--text-dim); overflow-y: auto; max-height: 200px;">
                    대회 정보 없음
                </div>
            </div>
        </div>

        <!-- 커뮤니티 반응 입력 섹션 -->
        <div class="reaction-card" id="reaction-section" style="display:none;">
            <div class="panel-header" style="color: var(--accent-gold);">💬 대회별 커뮤니티 반응 입력 <span style="font-size:0.75rem; color:var(--text-dim); font-weight:400;">(선택사항 — 입력 시 스크립트 톤에 자동 반영)</span></div>
            <div id="reaction-inputs"></div>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin: 4px 0 0;">📌 커뮤니티 반응을 입력한 뒤 다시 [프리뷰 생성] 버튼을 누르면 반응이 반영된 스크립트가 생성됩니다.</p>
        </div>

        <!-- 썸네일 후보 섹션 -->
        <div class="thumbnail-section" id="thumbnail-section">
            <div class="panel-header">🖼️ AI 추천 썸네일 문구 후보</div>
            <div class="thumbnail-grid" id="thumbnail-grid"></div>
        </div>


    </div>

    <script>
        const btnPreview = document.getElementById('btn-preview');
        const btnReport = document.getElementById('btn-report');
        const btnNotion = document.getElementById('btn-notion');
        const loaderPreview = document.getElementById('loader-preview');
        const loaderReport = document.getElementById('loader-report');
        const loaderNotion = document.getElementById('loader-notion');
        const outputScript = document.getElementById('output-script');
        const outputPoints = document.getElementById('output-points');
        const tourList = document.getElementById('tournaments-list');
        const scriptCount = document.getElementById('script-count');
        const reactionSection = document.getElementById('reaction-section');
        const reactionInputs = document.getElementById('reaction-inputs');
        const thumbnailSection = document.getElementById('thumbnail-section');
        const thumbnailGrid = document.getElementById('thumbnail-grid');

        let lastTournaments = [];

        // 커뮤니티 반응 입력란 동적 생성
        function buildReactionInputs(tournaments) {
            const active = tournaments.filter(t => t.name && t.name !== '해당 없음' && t.name !== '수집 실패');
            if (active.length === 0) { reactionSection.style.display = 'none'; return; }
            reactionInputs.innerHTML = active.map(t => `
                <div class="reaction-tour-item">
                    <label>[${t.tour}] ${t.name}</label>
                    <textarea id="reaction-${t.tour}" placeholder="ex) 친팅 전적 1위 중, 팬들 사이에서 열기 많음 / 코스 남로다코스 난이도 진짜 매우 높다는 도바 많음"></textarea>
                </div>`).join('');
            reactionSection.style.display = 'block';
        }

        // 커뮤니티 반응 값 펌 수집
        function collectReactions(tournaments) {
            const result = {};
            const active = tournaments.filter(t => t.name && t.name !== '해당 없음' && t.name !== '수집 실패');
            active.forEach(t => {
                const el = document.getElementById(`reaction-${t.tour}`);
                if (el && el.value.trim()) result[`${t.tour} - ${t.name}`] = el.value.trim();
            });
            return result;
        }

        // 썸네일 후보 렌더링
        function renderThumbnails(thumbnails) {
            if (!thumbnails || thumbnails.length === 0) { thumbnailSection.style.display = 'none'; return; }
            thumbnailGrid.innerHTML = thumbnails.map((t, i) => `
                <div class="thumbnail-card" onclick="copyText('${t.replace(/'/g, "\\'")}')" title="클릭하면 복사">
                    <div class="num">후보 ${i + 1}</div>
                    <div class="text">${t}</div>
                    <div class="copy-hint">클릭하면 클립보드에 복사 ↗</div>
                </div>`).join('');
            thumbnailSection.style.display = 'block';
            thumbnailSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.textContent = `'최복사: ${text}'`;
                toast.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0a84ff;color:white;padding:10px 24px;border-radius:999px;font-size:0.85rem;z-index:9999;pointer-events:none;opacity:1;transition:opacity 0.4s';
                document.body.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 1500);
            });
        }

        btnPreview.onclick = async () => {
            const date = document.getElementById('ref-date').value;
            const community_reactions = collectReactions(lastTournaments);
            loaderPreview.style.display = 'block';
            btnPreview.disabled = true;
            document.getElementById('label-script').innerHTML = '📝 TTS 스크립트 (프리뷰) <span id="script-count" class="status-badge" style="display:none;">0자</span>';
            document.getElementById('label-points').innerText = '⛳ 관전 포인트';

            try {
                const response = await fetch('/api/generate_preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date, community_reactions })
                });
                const data = await response.json();

                if (response.ok) {
                    outputScript.value = data.tts_script;
                    outputPoints.value = data.viewing_points;
                    const countSpan = document.getElementById('script-count');
                    countSpan.innerText = data.tts_script.length + '자';
                    countSpan.style.display = 'inline-block';
                    lastTournaments = data.tournaments;

                    tourList.innerHTML = data.tournaments.map(t => {
                        const status = t.name !== '해당 없음' && t.name !== '수집 실패' ? '✅' : '⚪';
                        return `<div>${status} [${t.tour}] ${t.name || '정보 없음'}</div>`;
                    }).join('');

                    buildReactionInputs(data.tournaments);
                    renderThumbnails(data.thumbnails);
                } else {
                    alert('에러: ' + data.detail);
                }
            } catch (e) {
                alert('네트워크 에러: ' + e);
            } finally {
                loaderPreview.style.display = 'none';
                btnPreview.disabled = false;
            }
        };

        btnReport.onclick = async () => {
            const date = document.getElementById('ref-date').value;
            loaderReport.style.display = 'block';
            btnReport.disabled = true;
            document.getElementById('label-script').innerHTML = '📽️ 뉴스 리포트 (결과) <span id="script-count" class="status-badge" style="display:none;">0자</span>';
            document.getElementById('label-points').innerText = '📊 주요 이슈 및 성적';

            try {
                const response = await fetch('/api/generate_report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date })
                });
                const data = await response.json();

                if (response.ok) {
                    outputScript.value = data.tts_script;
                    outputPoints.value = data.viewing_points;
                    const countSpan = document.getElementById('script-count');
                    countSpan.innerText = data.tts_script.length + '자';
                    countSpan.style.display = 'inline-block';
                    lastTournaments = data.tournaments;

                    tourList.innerHTML = data.tournaments.map(t => {
                        const status = t.name !== '해당 없음' && t.name !== '수집 실패' ? '✅' : '⚪';
                        return `<div>${status} [${t.tour}] ${t.name || '정보 없음'}</div>`;
                    }).join('');
                } else {
                    alert('에러: ' + data.detail);
                }
            } catch (e) {
                alert('네트워크 에러: ' + e);
            } finally {
                loaderReport.style.display = 'none';
                btnReport.disabled = false;
            }
        };


        // 노션 내보내기 함수
        btnNotion.onclick = async () => {
            const script = outputScript.value;
            if (!script) {
                alert('내보낼 데이터가 없습니다. 프리뷰 혹은 리포트를 먼저 생성해 주세요.');
                return;
            }

            // 현재 생성된 데이터의 유형 판단 (제목 라벨에서 추출)
            const typeLabel = document.getElementById('label-script').innerText; // Changed from scriptTitle to label-script
            const type = typeLabel.includes('리포트') ? '리포트' : '프리뷰';

            const btn = btnNotion;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading spinner-border spinner-border-sm"></span> 저장 중...';

            try {
                const response = await fetch('/api/export_notion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: document.getElementById('ref-date').value, // Changed from inputDate.value to ref-date.value
                        type: type, // 유형 추가 (프리뷰/리포트)
                        tts_script: script,
                        viewing_points: outputPoints.value,
                        tournaments: lastTournaments // Changed from currentTournaments to lastTournaments
                    })
                });
                const data = await response.json();

                if (response.ok) {
                    alert('성공적으로 노션에 저장되었습니다!');
                } else {
                    alert('노션 저장 실패: ' + data.detail);
                }
            } catch (e) {
                alert('네트워크 에러: ' + e);
            } finally {
                loaderNotion.style.display = 'none';
                btnNotion.disabled = false;
            }
        };
    </script>
</body>

</html>
